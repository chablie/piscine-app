<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale retiré : bloquer le zoom empêche les personnes malvoyantes
         d'agrandir le texte (critère d'accessibilité WCAG 1.4.4) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07a0f2" />
    <meta name="description" content="Louez à l'heure une piscine privée chauffée et couverte à Écouflant, près d'Angers. Réservation en ligne simple et sécurisée." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="My Piscine" />
    <title>My Piscine Privée – Location de piscine privée à Écouflant</title>
    <!-- Application installable : manifeste + icône d'écran d'accueil iOS -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icone-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      /* Identité visuelle inspirée de Swimmy : police ronde et joviale, fond clair épuré */
      body { font-family: 'Nunito', sans-serif; background: #f8f9fa; }
      input, select, textarea, button { font-family: 'Nunito', sans-serif; }

      /* ── Accessibilité ────────────────────────────────────────────────── */
      /* Indicateur de focus visible : indispensable pour la navigation au clavier.
         :focus-visible ne l'affiche qu'au clavier, pas au clic souris. */
      :focus-visible {
        outline: 3px solid #0480c4;
        outline-offset: 2px;
        border-radius: 4px;
      }
      /* Lien d'évitement : masqué jusqu'à ce qu'il reçoive le focus au clavier */
      .lien-evitement {
        position: absolute;
        left: -9999px;
        top: 0;
        z-index: 9999;
        background: #07a0f2;
        color: #fff;
        padding: 12px 20px;
        border-radius: 0 0 10px 0;
        font-weight: 700;
        text-decoration: none;
      }
      .lien-evitement:focus {
        left: 0;
      }
      /* Texte réservé aux lecteurs d'écran (visuellement masqué mais lu à voix haute) */
      .lecteur-ecran-seulement {
        position: absolute;
        width: 1px; height: 1px;
        padding: 0; margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      /* Respect du réglage système "réduire les animations" (vestibulaire) */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
      /* Responsive */
      @media (max-width: 480px) {
        input, select, textarea { font-size: 16px !important; } /* évite le zoom iOS */
      }
    </style>
  </head>
  <body>
    <a class="lien-evitement" href="#contenu-principal">Aller au contenu principal</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
